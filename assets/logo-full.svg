<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="brandGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="#0A0E1A" rx="16"/>
  
  <!-- Globe/Network Icon -->
  <g transform="translate(60, 100)" filter="url(#glow)">
    <!-- Globe circle -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="url(#nodeGlow)" stroke-width="2.5" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="48" ry="20" fill="none" stroke="url(#nodeGlow)" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="20" ry="48" fill="none" stroke="url(#nodeGlow)" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Connection nodes around globe -->
    <circle cx="-35" cy="-30" r="5" fill="#00D4AA">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="-15" r="4" fill="#7C3AED">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="35" r="5" fill="#FF6B35">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-40" cy="20" r="4" fill="#00D4AA">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="-42" r="3.5" fill="#7C3AED">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-15" cy="40" r="3.5" fill="#FF6B35">
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connection lines -->
    <line x1="-35" y1="-30" x2="40" y2="-15" stroke="url(#brandGlow)" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="-15" x2="25" y2="35" stroke="url(#brandGlow)" stroke-width="1" opacity="0.3"/>
    <line x1="-40" y1="20" x2="25" y2="35" stroke="url(#brandGlow)" stroke-width="1" opacity="0.3"/>
    <line x1="-35" y1="-30" x2="-15" y2="40" stroke="url(#brandGlow)" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="-42" x2="-40" y2="20" stroke="url(#brandGlow)" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="-42" x2="25" y2="35" stroke="url(#brandGlow)" stroke-width="1" opacity="0.3"/>
    
    <!-- Center pulse -->
    <circle cx="0" cy="0" r="8" fill="url(#brandGlow)" opacity="0.9">
      <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Text -->
  <text x="130" y="88" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="800" font-size="56" fill="url(#brandGlow)">AI</text>
  <text x="200" y="88" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="800" font-size="56" fill="#FFFFFF">4</text>
  <text x="238" y="88" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="800" font-size="56" fill="url(#brandGlow)">CHANGE</text>
  
  <!-- Tagline -->
  <text x="130" y="125" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="400" font-size="18" fill="#94A3B8" letter-spacing="0.15em">AI AS THE GREAT EQUALIZER</text>
  
  <!-- Subtle line separator -->
  <line x1="130" y1="140" x2="560" y2="140" stroke="url(#brandGlow)" stroke-width="1" opacity="0.2"/>
  
  <!-- Bottom tagline -->
  <text x="130" y="165" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="300" font-size="14" fill="#64748B">Real people · Real problems · Open source solutions</text>
</svg>
