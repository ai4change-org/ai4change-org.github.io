<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A"/>
      <stop offset="40%" style="stop-color:#1A1040"/>
      <stop offset="100%" style="stop-color:#0D2847"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF3CAC"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="950" cy="100" r="300" fill="#00D4AA" opacity="0.06"/>
  <circle cx="200" cy="530" r="200" fill="#7C3AED" opacity="0.06"/>
  <!-- Network nodes decoration -->
  <circle cx="150" cy="150" r="6" fill="#00D4AA" opacity="0.4"/>
  <circle cx="280" cy="100" r="4" fill="#7C3AED" opacity="0.3"/>
  <circle cx="1050" cy="480" r="5" fill="#FF6B35" opacity="0.4"/>
  <circle cx="1100" cy="200" r="4" fill="#00D4AA" opacity="0.3"/>
  <circle cx="900" cy="530" r="6" fill="#7C3AED" opacity="0.3"/>
  <line x1="150" y1="150" x2="280" y2="100" stroke="#00D4AA" stroke-width="1" opacity="0.2"/>
  <line x1="1050" y1="480" x2="1100" y2="200" stroke="#7C3AED" stroke-width="1" opacity="0.2"/>
  <!-- Globe icon -->
  <circle cx="600" cy="220" r="60" fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.5"/>
  <ellipse cx="600" cy="220" rx="60" ry="22" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="600" cy="220" rx="22" ry="60" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.3"/>
  <!-- Neural nodes on globe -->
  <circle cx="565" cy="190" r="5" fill="#00D4AA"/>
  <circle cx="600" cy="210" r="7" fill="url(#glow)"/>
  <circle cx="635" cy="195" r="5" fill="#7C3AED"/>
  <circle cx="580" cy="240" r="4" fill="#00D4AA"/>
  <circle cx="620" cy="245" r="5" fill="#FF6B35"/>
  <line x1="565" y1="190" x2="600" y2="210" stroke="#00D4AA" stroke-width="1.5" opacity="0.6"/>
  <line x1="600" y1="210" x2="635" y2="195" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>
  <line x1="600" y1="210" x2="580" y2="240" stroke="#00D4AA" stroke-width="1.5" opacity="0.6"/>
  <line x1="600" y1="210" x2="620" y2="245" stroke="#FF6B35" stroke-width="1.5" opacity="0.6"/>
  <!-- Brand name -->
  <text x="600" y="350" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="url(#glow)">AI4Change</text>
  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="400" fill="#94A3B8">AI as the Great Equalizer</text>
  <!-- Sub-tagline -->
  <text x="600" y="460" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="#64748B">Real people. Real problems. Open source solutions.</text>
  <!-- Bottom accent line -->
  <rect x="500" y="510" width="200" height="3" rx="1.5" fill="url(#glow)" opacity="0.6"/>
  <!-- Badge -->
  <rect x="465" y="530" width="270" height="32" rx="16" fill="#00D4AA" opacity="0.1" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.3"/>
  <text x="600" y="551" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="#00D4AA">Open Source  ·  Community Driven  ·  AI Powered</text>
</svg>
