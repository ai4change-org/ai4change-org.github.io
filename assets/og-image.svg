<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="35%" stop-color="#12082E"/>
      <stop offset="100%" stop-color="#0D2847"/>
    </linearGradient>
    <linearGradient id="tealViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="violetCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <radialGradient id="globeAmbient" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetAmbient" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralAmbient" cx="85%" cy="20%" r="30%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <filter id="ogGlow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="textShadow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Ambient glow orbs -->
  <rect width="1200" height="630" fill="url(#globeAmbient)"/>
  <rect width="1200" height="630" fill="url(#violetAmbient)"/>
  <rect width="1200" height="630" fill="url(#coralAmbient)"/>
  <!-- Background network grid (subtle) -->
  <g opacity="0.06">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#00D4AA" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#00D4AA" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00D4AA" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#00D4AA" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#00D4AA" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#00D4AA" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#00D4AA" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00D4AA" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#00D4AA" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#00D4AA" stroke-width="0.5"/>
  </g>
  <!-- Scattered background neural nodes -->
  <g opacity="0.2">
    <circle cx="100" cy="80" r="3" fill="#00D4AA"/>
    <circle cx="180" cy="150" r="2" fill="#7C3AED"/>
    <circle cx="320" cy="90" r="2.5" fill="#00D4AA"/>
    <circle cx="1080" cy="120" r="3" fill="#7C3AED"/>
    <circle cx="1020" cy="520" r="2.5" fill="#FF6B35"/>
    <circle cx="950" cy="560" r="2" fill="#00D4AA"/>
    <circle cx="150" cy="500" r="2" fill="#FF6B35"/>
    <circle cx="250" cy="550" r="2.5" fill="#7C3AED"/>
    <line x1="100" y1="80" x2="180" y2="150" stroke="#00D4AA" stroke-width="0.8"/>
    <line x1="180" y1="150" x2="320" y2="90" stroke="#7C3AED" stroke-width="0.8"/>
    <line x1="1020" y1="520" x2="1080" y2="120" stroke="#7C3AED" stroke-width="0.8"/>
    <line x1="950" y1="560" x2="1020" y2="520" stroke="#FF6B35" stroke-width="0.8"/>
    <line x1="150" y1="500" x2="250" y2="550" stroke="#FF6B35" stroke-width="0.8"/>
  </g>
  <!-- Central globe -->
  <g transform="translate(600, 200)">
    <!-- Globe ambient glow -->
    <circle cx="0" cy="0" r="90" fill="#00D4AA" opacity="0.04"/>
    <!-- Globe ring -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="url(#tealViolet)" stroke-width="2" opacity="0.4"/>
    <!-- Latitude lines -->
    <ellipse cx="0" cy="0" rx="75" ry="25" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="75" ry="50" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.12"/>
    <!-- Longitude lines -->
    <ellipse cx="0" cy="0" rx="25" ry="75" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="50" ry="75" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.12"/>
    <!-- Neural connections on globe -->
    <g filter="url(#ogGlow)" opacity="0.35">
      <line x1="-40" y1="-25" x2="-5" y2="-8" stroke="#00D4AA" stroke-width="2.5"/>
      <line x1="-5" y1="-8" x2="35" y2="-30" stroke="#00D4AA" stroke-width="2.5"/>
      <line x1="-5" y1="-8" x2="20" y2="30" stroke="#7C3AED" stroke-width="2.5"/>
      <line x1="-40" y1="-25" x2="-25" y2="25" stroke="#00D4AA" stroke-width="2.5"/>
      <line x1="35" y1="-30" x2="45" y2="10" stroke="#7C3AED" stroke-width="2.5"/>
    </g>
    <line x1="-40" y1="-25" x2="-5" y2="-8" stroke="url(#tealViolet)" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="-5" y1="-8" x2="35" y2="-30" stroke="url(#tealViolet)" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="-5" y1="-8" x2="20" y2="30" stroke="url(#violetCoral)" stroke-width="1.8" opacity="0.6" stroke-linecap="round"/>
    <line x1="-40" y1="-25" x2="-25" y2="25" stroke="url(#tealViolet)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="-25" y1="25" x2="20" y2="30" stroke="url(#violetCoral)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="35" y1="-30" x2="45" y2="10" stroke="url(#violetCoral)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="45" y1="10" x2="20" y2="30" stroke="#FF6B35" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <!-- Neural nodes -->
    <circle cx="-40" cy="-25" r="5.5" fill="#00D4AA"/>
    <circle cx="-5" cy="-8" r="7" fill="url(#tealViolet)"/>
    <circle cx="35" cy="-30" r="5" fill="#7C3AED"/>
    <circle cx="-25" cy="25" r="4.5" fill="#00D4AA"/>
    <circle cx="20" cy="30" r="5" fill="url(#violetCoral)"/>
    <circle cx="45" cy="10" r="4" fill="#FF6B35"/>
    <!-- Central node highlight -->
    <circle cx="-5" cy="-8" r="3" fill="white" opacity="0.35"/>
  </g>
  <!-- Brand name -->
  <text x="600" y="355" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="76" font-weight="700" letter-spacing="-1.5">
    <tspan fill="url(#tealViolet)">AI</tspan><tspan fill="#E2E8F0">4</tspan><tspan fill="url(#tealViolet)">Change</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="400" fill="#94A3B8">AI as the Great Equalizer</text>
  <!-- Sub-tagline -->
  <text x="600" y="452" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="#64748B">Real people. Real problems. Open source solutions.</text>
  <!-- Bottom accent line -->
  <rect x="530" y="486" width="140" height="2.5" rx="1.25" fill="url(#tealViolet)" opacity="0.5"/>
  <!-- Badge -->
  <rect x="440" y="508" width="320" height="36" rx="18" fill="#00D4AA" opacity="0.06" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.2"/>
  <text x="600" y="531" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="500" fill="#00D4AA" opacity="0.8">Open Source  ·  Community Driven  ·  AI Powered</text>
  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="12" fill="none" stroke="url(#tealViolet)" stroke-width="1" opacity="0.08"/>
</svg>