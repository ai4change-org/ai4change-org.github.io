<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Globe outline -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.3"/>
  <!-- Globe latitude lines -->
  <ellipse cx="100" cy="100" rx="80" ry="30" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.2"/>
  <ellipse cx="100" cy="100" rx="80" ry="55" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.2"/>
  <!-- Globe longitude lines -->
  <ellipse cx="100" cy="100" rx="30" ry="80" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.2"/>
  <ellipse cx="100" cy="100" rx="55" ry="80" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.2"/>
  <!-- Neural network connections -->
  <line x1="60" y1="50" x2="100" y2="70" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="70" x2="145" y2="55" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="70" x2="130" y2="110" stroke="url(#grad2)" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="50" x2="55" y2="105" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  <line x1="55" y1="105" x2="100" y2="130" stroke="url(#grad2)" stroke-width="2" opacity="0.6"/>
  <line x1="130" y1="110" x2="100" y2="130" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  <line x1="145" y1="55" x2="130" y2="110" stroke="url(#grad2)" stroke-width="2" opacity="0.6"/>
  <line x1="55" y1="105" x2="130" y2="110" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
  <line x1="60" y1="50" x2="100" y2="130" stroke="url(#grad2)" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="70" x2="75" y2="145" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
  <line x1="75" y1="145" x2="100" y2="130" stroke="url(#grad2)" stroke-width="1.5" opacity="0.3"/>
  <line x1="75" y1="145" x2="55" y2="105" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
  <!-- Neural network nodes -->
  <circle cx="60" cy="50" r="8" fill="#00D4AA"/>
  <circle cx="100" cy="70" r="10" fill="url(#grad1)"/>
  <circle cx="145" cy="55" r="7" fill="#7C3AED"/>
  <circle cx="55" cy="105" r="7" fill="#00D4AA"/>
  <circle cx="130" cy="110" r="9" fill="url(#grad2)"/>
  <circle cx="100" cy="130" r="8" fill="#7C3AED"/>
  <circle cx="75" cy="145" r="6" fill="#FF6B35"/>
  <!-- Inner glow on main node -->
  <circle cx="100" cy="70" r="4" fill="white" opacity="0.5"/>
</svg>
