<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="tealGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00A88A"/>
    </linearGradient>
    <linearGradient id="tealViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="violetCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Globe ambient glow -->
  <circle cx="90" cy="100" r="85" fill="url(#globeGlow)"/>
  <!-- Globe outer ring -->
  <circle cx="90" cy="100" r="62" fill="none" stroke="url(#tealViolet)" stroke-width="2" opacity="0.35"/>
  <!-- Latitude lines -->
  <ellipse cx="90" cy="100" rx="62" ry="20" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.15"/>
  <ellipse cx="90" cy="100" rx="62" ry="40" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.12"/>
  <!-- Longitude lines -->
  <ellipse cx="90" cy="100" rx="20" ry="62" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.15"/>
  <ellipse cx="90" cy="100" rx="42" ry="62" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.12"/>
  <!-- Simplified continent shapes (abstract landmasses) -->
  <!-- North America -->
  <path d="M62 62 C65 58,75 55,80 58 C85 61,82 68,78 72 C74 76,65 78,60 74 C56 70,58 65,62 62Z" fill="#00D4AA" opacity="0.12"/>
  <!-- Europe/Africa -->
  <path d="M98 60 C102 57,108 58,112 62 C116 66,114 75,110 80 C106 85,100 88,96 92 C92 96,90 105,92 110 C94 115,98 118,96 122 C94 126,88 124,86 118 C84 112,86 100,90 92 C88 85,92 78,94 72 C96 66,94 62,98 60Z" fill="#00D4AA" opacity="0.1"/>
  <!-- South America -->
  <path d="M72 108 C76 106,80 108,82 112 C84 116,82 124,78 130 C74 136,70 134,68 128 C66 122,68 114,72 108Z" fill="#00D4AA" opacity="0.1"/>
  <!-- Asia -->
  <path d="M108 68 C114 65,122 66,126 70 C130 74,128 80,124 82 C120 84,115 82,112 78 C109 74,106 70,108 68Z" fill="#00D4AA" opacity="0.1"/>
  <!-- Neural network connections (glowing pathways across the globe) -->
  <!-- Connection glow layer -->
  <g filter="url(#nodeGlow)" opacity="0.4">
    <line x1="55" y1="78" x2="78" y2="88" stroke="#00D4AA" stroke-width="2"/>
    <line x1="78" y1="88" x2="108" y2="76" stroke="#00D4AA" stroke-width="2"/>
    <line x1="78" y1="88" x2="90" y2="118" stroke="#7C3AED" stroke-width="2"/>
    <line x1="108" y1="76" x2="125" y2="92" stroke="#7C3AED" stroke-width="2"/>
    <line x1="55" y1="78" x2="68" y2="112" stroke="#00D4AA" stroke-width="2"/>
  </g>
  <!-- Connection lines -->
  <line x1="55" y1="78" x2="78" y2="88" stroke="url(#tealViolet)" stroke-width="1.8" opacity="0.7" stroke-linecap="round"/>
  <line x1="78" y1="88" x2="108" y2="76" stroke="url(#tealViolet)" stroke-width="1.8" opacity="0.7" stroke-linecap="round"/>
  <line x1="78" y1="88" x2="90" y2="118" stroke="url(#violetCoral)" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="108" y1="76" x2="125" y2="92" stroke="url(#violetCoral)" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="55" y1="78" x2="68" y2="112" stroke="url(#tealViolet)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="68" y1="112" x2="90" y2="118" stroke="url(#tealViolet)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="125" y1="92" x2="90" y2="118" stroke="url(#violetCoral)" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="55" y1="78" x2="108" y2="76" stroke="#00D4AA" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>
  <line x1="68" y1="112" x2="125" y2="92" stroke="#7C3AED" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>
  <!-- Neural nodes (people/connection points) -->
  <!-- Node glow layer -->
  <g filter="url(#nodeGlow)" opacity="0.5">
    <circle cx="55" cy="78" r="5" fill="#00D4AA"/>
    <circle cx="78" cy="88" r="7" fill="#00D4AA"/>
    <circle cx="108" cy="76" r="5" fill="#7C3AED"/>
    <circle cx="125" cy="92" r="4.5" fill="#FF6B35"/>
    <circle cx="68" cy="112" r="4" fill="#00D4AA"/>
    <circle cx="90" cy="118" r="5" fill="#7C3AED"/>
  </g>
  <!-- Node circles -->
  <circle cx="55" cy="78" r="4.5" fill="#00D4AA"/>
  <circle cx="78" cy="88" r="6" fill="url(#tealViolet)"/>
  <circle cx="108" cy="76" r="4.5" fill="#7C3AED"/>
  <circle cx="125" cy="92" r="4" fill="#FF6B35"/>
  <circle cx="68" cy="112" r="3.5" fill="#00D4AA"/>
  <circle cx="90" cy="118" r="4.5" fill="url(#violetCoral)"/>
  <!-- Central node inner highlight -->
  <circle cx="78" cy="88" r="2.5" fill="white" opacity="0.4"/>
  <!-- Orbital ring accent -->
  <ellipse cx="90" cy="100" rx="72" ry="28" fill="none" stroke="url(#tealViolet)" stroke-width="0.6" opacity="0.15" stroke-dasharray="4 6"/>
  <!-- AI4Change wordmark -->
  <text x="190" y="92" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="#E2E8F0" letter-spacing="-1">
    <tspan fill="url(#tealViolet)">AI</tspan><tspan fill="#E2E8F0">4</tspan><tspan fill="url(#tealViolet)">Change</tspan>
  </text>
  <!-- Tagline -->
  <text x="192" y="118" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#94A3B8" letter-spacing="3" text-transform="uppercase">AI AS THE GREAT EQUALIZER</text>
  <!-- Subtle underline accent -->
  <rect x="192" y="126" width="80" height="2" rx="1" fill="url(#tealViolet)" opacity="0.5"/>
</svg>