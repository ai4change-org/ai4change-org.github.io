<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad-teal-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1A1040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0E1A;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="url(#grad-teal-violet)" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Outer orbit ring -->
  <ellipse cx="256" cy="256" rx="180" ry="170" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.15"/>
  <ellipse cx="256" cy="256" rx="140" ry="130" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.12"/>
  
  <!-- Connection lines (neural network) -->
  <g stroke="url(#grad-line)" stroke-width="1.2" fill="none" opacity="0.5">
    <!-- Core connections -->
    <line x1="256" y1="130" x2="170" y2="200"/>
    <line x1="256" y1="130" x2="340" y2="195"/>
    <line x1="256" y1="130" x2="256" y2="256"/>
    <line x1="170" y1="200" x2="140" y2="300"/>
    <line x1="170" y1="200" x2="256" y2="256"/>
    <line x1="340" y1="195" x2="370" y2="290"/>
    <line x1="340" y1="195" x2="256" y2="256"/>
    <line x1="140" y1="300" x2="200" y2="370"/>
    <line x1="140" y1="300" x2="256" y2="256"/>
    <line x1="370" y1="290" x2="310" y2="375"/>
    <line x1="370" y1="290" x2="256" y2="256"/>
    <line x1="200" y1="370" x2="256" y2="256"/>
    <line x1="310" y1="375" x2="256" y2="256"/>
    <line x1="200" y1="370" x2="310" y2="375"/>
    <!-- Extended connections -->
    <line x1="170" y1="200" x2="340" y2="195"/>
    <line x1="140" y1="300" x2="370" y2="290"/>
    <line x1="200" y1="370" x2="370" y2="290"/>
    <line x1="310" y1="375" x2="140" y2="300"/>
    <!-- Outer reach lines -->
    <line x1="256" y1="130" x2="200" y2="370" opacity="0.2"/>
    <line x1="256" y1="130" x2="310" y2="375" opacity="0.2"/>
    <line x1="170" y1="200" x2="310" y2="375" opacity="0.2"/>
    <line x1="340" y1="195" x2="200" y2="370" opacity="0.2"/>
  </g>
  
  <!-- Secondary nodes (smaller, dimmer) -->
  <g opacity="0.4">
    <circle cx="210" cy="160" r="3" fill="#00D4AA"/>
    <circle cx="300" cy="165" r="3" fill="#7C3AED"/>
    <circle cx="155" cy="250" r="3" fill="#00D4AA"/>
    <circle cx="360" cy="240" r="3" fill="#7C3AED"/>
    <circle cx="170" cy="340" r="3" fill="#00D4AA"/>
    <circle cx="345" cy="335" r="3" fill="#7C3AED"/>
    <circle cx="255" cy="310" r="2.5" fill="#00D4AA"/>
    <circle cx="225" cy="230" r="2.5" fill="#7C3AED"/>
    <circle cx="290" cy="225" r="2.5" fill="#00D4AA"/>
  </g>
  
  <!-- Primary nodes — "People" positions (continent-like placement) -->
  <!-- North/Top — "Europe" -->
  <circle cx="256" cy="130" r="10" fill="#00D4AA" filter="url(#glow)"/>
  <circle cx="256" cy="130" r="5" fill="#fff" opacity="0.9"/>
  
  <!-- West — "Americas" -->
  <circle cx="170" cy="200" r="9" fill="#00D4AA" filter="url(#glow)"/>
  <circle cx="170" cy="200" r="4.5" fill="#fff" opacity="0.85"/>
  
  <!-- East — "Asia" -->
  <circle cx="340" cy="195" r="9" fill="#7C3AED" filter="url(#glow)"/>
  <circle cx="340" cy="195" r="4.5" fill="#fff" opacity="0.85"/>
  
  <!-- Southwest — "Africa" -->
  <circle cx="140" cy="300" r="9" fill="#FF6B35" filter="url(#glow)"/>
  <circle cx="140" cy="300" r="4.5" fill="#fff" opacity="0.85"/>
  
  <!-- Southeast — "Oceania" -->
  <circle cx="370" cy="290" r="8" fill="#7C3AED" filter="url(#glow)"/>
  <circle cx="370" cy="290" r="4" fill="#fff" opacity="0.85"/>
  
  <!-- Bottom left — "South America" -->
  <circle cx="200" cy="370" r="8" fill="#00D4AA" filter="url(#glow)"/>
  <circle cx="200" cy="370" r="4" fill="#fff" opacity="0.85"/>
  
  <!-- Bottom right -->
  <circle cx="310" cy="375" r="8" fill="#FF6B35" filter="url(#glow)"/>
  <circle cx="310" cy="375" r="4" fill="#fff" opacity="0.85"/>
  
  <!-- Center hub — the AI core -->
  <circle cx="256" cy="256" r="20" fill="url(#grad-teal-violet)" filter="url(#glow-strong)" opacity="0.9"/>
  <circle cx="256" cy="256" r="12" fill="#0A0E1A"/>
  <circle cx="256" cy="256" r="8" fill="url(#grad-teal-violet)" opacity="0.8"/>
  <circle cx="256" cy="256" r="4" fill="#fff" opacity="0.95"/>
  
  <!-- Pulse rings around center -->
  <circle cx="256" cy="256" r="30" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.2"/>
  <circle cx="256" cy="256" r="45" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.1"/>
</svg>
