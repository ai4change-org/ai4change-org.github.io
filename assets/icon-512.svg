<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="vc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </radialGradient>
    <filter id="ng">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0A0E1A"/>
  <rect width="512" height="512" rx="96" fill="url(#rg)"/>
  <!-- Globe ring -->
  <circle cx="256" cy="230" r="138" fill="none" stroke="url(#tv)" stroke-width="4" opacity="0.3"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="230" rx="138" ry="46" fill="none" stroke="#00D4AA" stroke-width="1.2" opacity="0.12"/>
  <ellipse cx="256" cy="230" rx="138" ry="90" fill="none" stroke="#00D4AA" stroke-width="1" opacity="0.08"/>
  <!-- Longitude lines -->
  <ellipse cx="256" cy="230" rx="46" ry="138" fill="none" stroke="#00D4AA" stroke-width="1.2" opacity="0.12"/>
  <ellipse cx="256" cy="230" rx="90" ry="138" fill="none" stroke="#00D4AA" stroke-width="1" opacity="0.08"/>
  <!-- Neural connection glow -->
  <g filter="url(#ng)" opacity="0.3">
    <line x1="182" y1="188" x2="240" y2="218" stroke="#00D4AA" stroke-width="5"/>
    <line x1="240" y1="218" x2="320" y2="184" stroke="#00D4AA" stroke-width="5"/>
    <line x1="240" y1="218" x2="290" y2="280" stroke="#7C3AED" stroke-width="5"/>
    <line x1="182" y1="188" x2="205" y2="272" stroke="#00D4AA" stroke-width="5"/>
    <line x1="320" y1="184" x2="290" y2="280" stroke="#7C3AED" stroke-width="5"/>
  </g>
  <!-- Neural connections -->
  <line x1="182" y1="188" x2="240" y2="218" stroke="url(#tv)" stroke-width="3.5" opacity="0.7" stroke-linecap="round"/>
  <line x1="240" y1="218" x2="320" y2="184" stroke="url(#tv)" stroke-width="3.5" opacity="0.7" stroke-linecap="round"/>
  <line x1="240" y1="218" x2="290" y2="280" stroke="url(#vc)" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <line x1="182" y1="188" x2="205" y2="272" stroke="url(#tv)" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="205" y1="272" x2="290" y2="280" stroke="url(#vc)" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="320" y1="184" x2="290" y2="280" stroke="#7C3AED" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="182" y1="188" x2="290" y2="280" stroke="#00D4AA" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="320" y1="184" x2="205" y2="272" stroke="#7C3AED" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <!-- Neural nodes -->
  <circle cx="182" cy="188" r="12" fill="#00D4AA"/>
  <circle cx="240" cy="218" r="16" fill="url(#tv)"/>
  <circle cx="320" cy="184" r="11" fill="#7C3AED"/>
  <circle cx="205" cy="272" r="10" fill="#00D4AA"/>
  <circle cx="290" cy="280" r="12" fill="#FF6B35"/>
  <!-- Central highlight -->
  <circle cx="240" cy="218" r="7" fill="white" opacity="0.3"/>
  <!-- AI4Change text -->
  <text x="256" y="430" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-1">
    <tspan fill="url(#tv)">AI</tspan><tspan fill="#E2E8F0">4</tspan><tspan fill="url(#tv)">Change</tspan>
  </text>
</svg>