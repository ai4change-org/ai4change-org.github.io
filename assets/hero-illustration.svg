<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" width="1400" height="600">
  <defs>
    <linearGradient id="tealViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="violetCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="tealDown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="violetDown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#7C3AED" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </radialGradient>
    <filter id="pathGlow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="personGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <!-- Person silhouette (head + shoulders) as a reusable symbol -->
    <symbol id="person" viewBox="0 0 30 44">
      <circle cx="15" cy="10" r="7"/>
      <path d="M3 44 C3 30,7 24,15 22 C23 24,27 30,27 44Z"/>
    </symbol>
  </defs>

  <!-- Central ambient glow -->
  <ellipse cx="700" cy="300" rx="500" ry="280" fill="url(#centerGlow)"/>

  <!-- ==================== CENTRAL GLOBE ==================== -->
  <g transform="translate(700, 270)">
    <!-- Globe outer glow -->
    <circle cx="0" cy="0" r="150" fill="#00D4AA" opacity="0.02"/>
    <!-- Globe ring -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="url(#tealViolet)" stroke-width="1.5" opacity="0.2"/>
    <circle cx="0" cy="0" r="132" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.08"/>
    <!-- Latitude lines -->
    <ellipse cx="0" cy="0" rx="130" ry="32" fill="none" stroke="#00D4AA" stroke-width="0.6" opacity="0.1"/>
    <ellipse cx="0" cy="0" rx="130" ry="65" fill="none" stroke="#00D4AA" stroke-width="0.6" opacity="0.08"/>
    <ellipse cx="0" cy="0" rx="130" ry="100" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.06"/>
    <!-- Longitude lines -->
    <ellipse cx="0" cy="0" rx="32" ry="130" fill="none" stroke="#00D4AA" stroke-width="0.6" opacity="0.1"/>
    <ellipse cx="0" cy="0" rx="65" ry="130" fill="none" stroke="#00D4AA" stroke-width="0.6" opacity="0.08"/>
    <ellipse cx="0" cy="0" rx="100" ry="130" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.06"/>
    <!-- Orbital ring -->
    <ellipse cx="0" cy="0" rx="160" ry="50" fill="none" stroke="url(#tealViolet)" stroke-width="0.8" opacity="0.12" stroke-dasharray="6 10" transform="rotate(-15)"/>
    <!-- Abstract continent patches -->
    <path d="M-60,-60 C-50,-70,-30,-65,-20,-55 C-10,-45,-15,-30,-30,-25 C-45,-20,-55,-35,-60,-50Z" fill="#00D4AA" opacity="0.06"/>
    <path d="M20,-40 C35,-50,55,-45,60,-30 C65,-15,50,0,35,5 C20,10,10,0,15,-15 C18,-25,15,-35,20,-40Z" fill="#00D4AA" opacity="0.05"/>
    <path d="M-50,20 C-40,15,-25,20,-20,35 C-15,50,-25,65,-40,60 C-55,55,-58,30,-50,20Z" fill="#00D4AA" opacity="0.05"/>
    <path d="M30,30 C45,25,60,35,55,50 C50,65,35,60,30,50 C25,40,25,35,30,30Z" fill="#7C3AED" opacity="0.04"/>
  </g>

  <!-- ==================== NEURAL NETWORK (globe-scale) ==================== -->
  <!-- Glow layer for major pathways -->
  <g filter="url(#pathGlow)" opacity="0.3">
    <!-- Major pathways connecting people around the globe -->
    <line x1="200" y1="220" x2="460" y2="240" stroke="#00D4AA" stroke-width="3"/>
    <line x1="460" y1="240" x2="630" y2="200" stroke="#00D4AA" stroke-width="3"/>
    <line x1="630" y1="200" x2="770" y2="195" stroke="#7C3AED" stroke-width="3"/>
    <line x1="770" y1="195" x2="940" y2="235" stroke="#7C3AED" stroke-width="3"/>
    <line x1="940" y1="235" x2="1200" y2="210" stroke="#FF6B35" stroke-width="3"/>
    <line x1="200" y1="380" x2="460" y2="350" stroke="#00D4AA" stroke-width="3"/>
    <line x1="460" y1="350" x2="660" y2="370" stroke="#7C3AED" stroke-width="3"/>
    <line x1="660" y1="370" x2="740" y2="360" stroke="#7C3AED" stroke-width="3"/>
    <line x1="740" y1="360" x2="940" y2="340" stroke="#FF6B35" stroke-width="3"/>
    <line x1="940" y1="340" x2="1200" y2="370" stroke="#FF6B35" stroke-width="3"/>
    <!-- Cross connections -->
    <line x1="460" y1="240" x2="660" y2="370" stroke="#00D4AA" stroke-width="2"/>
    <line x1="630" y1="200" x2="740" y2="360" stroke="#7C3AED" stroke-width="2"/>
    <line x1="770" y1="195" x2="940" y2="340" stroke="#7C3AED" stroke-width="2"/>
    <line x1="460" y1="350" x2="630" y2="200" stroke="#00D4AA" stroke-width="2"/>
    <line x1="940" y1="235" x2="1200" y2="370" stroke="#FF6B35" stroke-width="2"/>
    <line x1="200" y1="220" x2="460" y2="350" stroke="#00D4AA" stroke-width="2"/>
  </g>
  <!-- Solid pathways -->
  <g stroke-linecap="round">
    <!-- Top row connections -->
    <line x1="200" y1="220" x2="460" y2="240" stroke="url(#tealViolet)" stroke-width="1.5" opacity="0.5"/>
    <line x1="460" y1="240" x2="630" y2="200" stroke="url(#tealViolet)" stroke-width="1.5" opacity="0.5"/>
    <line x1="630" y1="200" x2="770" y2="195" stroke="url(#tealViolet)" stroke-width="1.8" opacity="0.6"/>
    <line x1="770" y1="195" x2="940" y2="235" stroke="url(#violetCoral)" stroke-width="1.5" opacity="0.5"/>
    <line x1="940" y1="235" x2="1200" y2="210" stroke="url(#violetCoral)" stroke-width="1.5" opacity="0.5"/>
    <!-- Bottom row connections -->
    <line x1="200" y1="380" x2="460" y2="350" stroke="url(#tealViolet)" stroke-width="1.5" opacity="0.5"/>
    <line x1="460" y1="350" x2="660" y2="370" stroke="url(#tealViolet)" stroke-width="1.5" opacity="0.5"/>
    <line x1="660" y1="370" x2="740" y2="360" stroke="url(#violetCoral)" stroke-width="1.8" opacity="0.6"/>
    <line x1="740" y1="360" x2="940" y2="340" stroke="url(#violetCoral)" stroke-width="1.5" opacity="0.5"/>
    <line x1="940" y1="340" x2="1200" y2="370" stroke="url(#violetCoral)" stroke-width="1.5" opacity="0.5"/>
    <!-- Cross connections -->
    <line x1="460" y1="240" x2="660" y2="370" stroke="#00D4AA" stroke-width="0.8" opacity="0.2"/>
    <line x1="630" y1="200" x2="740" y2="360" stroke="#7C3AED" stroke-width="0.8" opacity="0.2"/>
    <line x1="770" y1="195" x2="940" y2="340" stroke="#7C3AED" stroke-width="0.8" opacity="0.25"/>
    <line x1="460" y1="350" x2="630" y2="200" stroke="#00D4AA" stroke-width="0.8" opacity="0.2"/>
    <line x1="940" y1="235" x2="1200" y2="370" stroke="#FF6B35" stroke-width="0.8" opacity="0.2"/>
    <line x1="200" y1="220" x2="460" y2="350" stroke="#00D4AA" stroke-width="0.8" opacity="0.15"/>
    <line x1="1200" y1="210" x2="940" y2="340" stroke="#FF6B35" stroke-width="0.8" opacity="0.2"/>
    <!-- Vertical bridge connections -->
    <line x1="460" y1="240" x2="460" y2="350" stroke="#00D4AA" stroke-width="0.6" opacity="0.15"/>
    <line x1="940" y1="235" x2="940" y2="340" stroke="#FF6B35" stroke-width="0.6" opacity="0.15"/>
  </g>

  <!-- ==================== PEOPLE SILHOUETTES ==================== -->
  <!-- Person glow halos -->
  <g filter="url(#personGlow)" opacity="0.2">
    <circle cx="200" cy="210" r="18" fill="#00D4AA"/>
    <circle cx="460" cy="230" r="18" fill="#00D4AA"/>
    <circle cx="630" cy="190" r="18" fill="#7C3AED"/>
    <circle cx="770" cy="185" r="18" fill="#7C3AED"/>
    <circle cx="940" cy="225" r="18" fill="#FF6B35"/>
    <circle cx="1200" cy="200" r="18" fill="#FF6B35"/>
    <circle cx="200" cy="370" r="18" fill="#00D4AA"/>
    <circle cx="460" cy="340" r="18" fill="#00D4AA"/>
    <circle cx="660" cy="360" r="18" fill="#7C3AED"/>
    <circle cx="740" cy="350" r="18" fill="#7C3AED"/>
    <circle cx="940" cy="330" r="18" fill="#FF6B35"/>
    <circle cx="1200" cy="360" r="18" fill="#FF6B35"/>
  </g>
  <!-- Top row people -->
  <use href="#person" x="185" y="192" width="30" height="44" fill="#00D4AA" opacity="0.7"/>
  <use href="#person" x="445" y="212" width="30" height="44" fill="#00D4AA" opacity="0.65"/>
  <use href="#person" x="615" y="172" width="30" height="44" fill="#7C3AED" opacity="0.6"/>
  <use href="#person" x="755" y="167" width="30" height="44" fill="#7C3AED" opacity="0.65"/>
  <use href="#person" x="925" y="207" width="30" height="44" fill="#FF6B35" opacity="0.6"/>
  <use href="#person" x="1185" y="182" width="30" height="44" fill="#FF6B35" opacity="0.55"/>
  <!-- Bottom row people -->
  <use href="#person" x="185" y="352" width="30" height="44" fill="#00D4AA" opacity="0.6"/>
  <use href="#person" x="445" y="322" width="30" height="44" fill="#00D4AA" opacity="0.55"/>
  <use href="#person" x="645" y="342" width="30" height="44" fill="#7C3AED" opacity="0.6"/>
  <use href="#person" x="725" y="332" width="30" height="44" fill="#7C3AED" opacity="0.55"/>
  <use href="#person" x="925" y="312" width="30" height="44" fill="#FF6B35" opacity="0.6"/>
  <use href="#person" x="1185" y="342" width="30" height="44" fill="#FF6B35" opacity="0.5"/>

  <!-- ==================== MAJOR NEURAL NODES ==================== -->
  <!-- These glow behind the people, representing the AI connection points -->
  <circle cx="200" cy="220" r="5" fill="#00D4AA" opacity="0.8"/>
  <circle cx="460" cy="240" r="6" fill="#00D4AA" opacity="0.8"/>
  <circle cx="630" cy="200" r="5.5" fill="#7C3AED" opacity="0.8"/>
  <circle cx="770" cy="195" r="6.5" fill="url(#tealViolet)" opacity="0.9"/>
  <circle cx="940" cy="235" r="5.5" fill="#FF6B35" opacity="0.8"/>
  <circle cx="1200" cy="210" r="5" fill="#FF6B35" opacity="0.7"/>
  <circle cx="200" cy="380" r="5" fill="#00D4AA" opacity="0.7"/>
  <circle cx="460" cy="350" r="5.5" fill="#00D4AA" opacity="0.7"/>
  <circle cx="660" cy="370" r="5" fill="#7C3AED" opacity="0.7"/>
  <circle cx="740" cy="360" r="6" fill="url(#violetCoral)" opacity="0.8"/>
  <circle cx="940" cy="340" r="5.5" fill="#FF6B35" opacity="0.7"/>
  <circle cx="1200" cy="370" r="5" fill="#FF6B35" opacity="0.6"/>

  <!-- ==================== FLOATING PARTICLES ==================== -->
  <g opacity="0.3">
    <circle cx="120" cy="160" r="1.5" fill="#00D4AA"/>
    <circle cx="340" cy="180" r="1" fill="#7C3AED"/>
    <circle cx="550" cy="150" r="1.5" fill="#00D4AA"/>
    <circle cx="850" cy="160" r="1" fill="#FF6B35"/>
    <circle cx="1050" cy="180" r="1.5" fill="#7C3AED"/>
    <circle cx="1300" cy="170" r="1" fill="#00D4AA"/>
    <circle cx="100" cy="440" r="1" fill="#7C3AED"/>
    <circle cx="330" cy="420" r="1.5" fill="#00D4AA"/>
    <circle cx="560" cy="450" r="1" fill="#FF6B35"/>
    <circle cx="840" cy="430" r="1.5" fill="#7C3AED"/>
    <circle cx="1060" cy="440" r="1" fill="#00D4AA"/>
    <circle cx="1280" cy="420" r="1.5" fill="#FF6B35"/>
    <!-- Extra scattered dots -->
    <circle cx="70" cy="300" r="1" fill="#00D4AA"/>
    <circle cx="1340" cy="290" r="1" fill="#FF6B35"/>
    <circle cx="700" cy="120" r="2" fill="#00D4AA" opacity="0.5"/>
    <circle cx="700" cy="480" r="2" fill="#7C3AED" opacity="0.5"/>
  </g>

  <!-- ==================== DATA FLOW PARTICLES (animated suggestion) ==================== -->
  <!-- Small bright dots along the pathways -->
  <g opacity="0.6">
    <circle cx="330" cy="230" r="2" fill="#00D4AA"/>
    <circle cx="545" cy="220" r="1.5" fill="#00D4AA"/>
    <circle cx="700" cy="198" r="2.5" fill="url(#tealViolet)"/>
    <circle cx="855" cy="215" r="2" fill="#7C3AED"/>
    <circle cx="1070" cy="222" r="1.5" fill="#FF6B35"/>
    <circle cx="330" cy="365" r="1.5" fill="#00D4AA"/>
    <circle cx="560" cy="360" r="2" fill="#7C3AED"/>
    <circle cx="700" cy="365" r="2.5" fill="url(#violetCoral)"/>
    <circle cx="840" cy="350" r="1.5" fill="#FF6B35"/>
    <circle cx="1070" cy="355" r="2" fill="#FF6B35"/>
  </g>

  <!-- ==================== EDGE FADE (blends into page background) ==================== -->
  <defs>
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="8%" y2="0%">
      <stop offset="0%" stop-color="#0A0E1A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="92%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0E1A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0%" y1="0%" x2="0%" y2="10%">
      <stop offset="0%" stop-color="#0A0E1A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="90%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="600" fill="url(#fadeLeft)"/>
  <rect width="1400" height="600" fill="url(#fadeRight)"/>
  <rect width="1400" height="600" fill="url(#fadeTop)"/>
  <rect width="1400" height="600" fill="url(#fadeBottom)"/>
</svg>