<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A"/>
      <stop offset="35%" style="stop-color:#12082E"/>
      <stop offset="100%" style="stop-color:#0D2847"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <radialGradient id="o1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="o2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="300" fill="url(#o1)"/>
  <circle cx="300" cy="550" r="250" fill="url(#o2)"/>
  
  <!-- Play button circle -->
  <circle cx="640" cy="320" r="60" fill="url(#g1)" opacity="0.9"/>
  <polygon points="625,290 625,350 670,320" fill="#0A0E1A"/>
  
  <!-- Title -->
  <text x="640" y="460" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="800" font-size="64" fill="#FFFFFF" text-anchor="middle">WHAT IF AI COULD BE</text>
  <text x="640" y="530" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="800" font-size="64" fill="url(#g1)" text-anchor="middle">EVERYONE'S INSTRUMENT?</text>
  
  <!-- Badge -->
  <rect x="520" y="575" width="240" height="36" rx="18" fill="#00D4AA" opacity="0.15" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="640" y="599" font-family="'Inter', sans-serif" font-size="15" font-weight="600" fill="#00D4AA" text-anchor="middle">AI4CHANGE MANIFESTO</text>
  
  <!-- Subtitle -->
  <text x="640" y="670" font-family="'Inter', sans-serif" font-size="18" fill="#64748B" text-anchor="middle">ai4change-org.github.io</text>
</svg>
