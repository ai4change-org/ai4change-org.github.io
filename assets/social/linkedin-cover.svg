<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A"/>
      <stop offset="40%" style="stop-color:#1A1040"/>
      <stop offset="100%" style="stop-color:#0D2847"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1584" height="396" fill="url(#heroBg)"/>
  
  <!-- Ambient orbs -->
  <circle cx="1300" cy="80" r="250" fill="url(#orb1)"/>
  <circle cx="200" cy="350" r="200" fill="url(#orb2)"/>
  
  <!-- Grid pattern (subtle) -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="99" x2="1584" y2="99"/><line x1="0" y1="198" x2="1584" y2="198"/>
    <line x1="0" y1="297" x2="1584" y2="297"/>
    <line x1="396" y1="0" x2="396" y2="396"/><line x1="792" y1="0" x2="792" y2="396"/>
    <line x1="1188" y1="0" x2="1188" y2="396"/>
  </g>
  
  <!-- Global network visualization (right side) -->
  <g transform="translate(1200, 198)" opacity="0.7">
    <!-- Large globe outline -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#00D4AA" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="140" ry="55" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.1"/>
    <ellipse cx="0" cy="0" rx="55" ry="140" fill="none" stroke="#7C3AED" stroke-width="0.8" opacity="0.1"/>
    
    <!-- Connection nodes - representing global contributors -->
    <circle cx="-90" cy="-80" r="6" fill="#00D4AA" opacity="0.8"/>
    <circle cx="100" cy="-50" r="5" fill="#7C3AED" opacity="0.8"/>
    <circle cx="60" cy="90" r="6" fill="#FF6B35" opacity="0.8"/>
    <circle cx="-110" cy="40" r="5" fill="#00D4AA" opacity="0.7"/>
    <circle cx="30" cy="-110" r="4" fill="#7C3AED" opacity="0.7"/>
    <circle cx="-50" cy="100" r="5" fill="#FF6B35" opacity="0.7"/>
    <circle cx="120" cy="30" r="4" fill="#00D4AA" opacity="0.6"/>
    <circle cx="-30" cy="-60" r="4" fill="#7C3AED" opacity="0.6"/>
    <circle cx="80" cy="-90" r="3.5" fill="#FF6B35" opacity="0.6"/>
    <circle cx="-80" cy="80" r="3.5" fill="#00D4AA" opacity="0.5"/>
    
    <!-- Connection lines -->
    <line x1="-90" y1="-80" x2="100" y2="-50" stroke="#00D4AA" stroke-width="0.8" opacity="0.2"/>
    <line x1="100" y1="-50" x2="60" y2="90" stroke="#7C3AED" stroke-width="0.8" opacity="0.2"/>
    <line x1="-110" y1="40" x2="60" y2="90" stroke="#FF6B35" stroke-width="0.8" opacity="0.2"/>
    <line x1="-90" y1="-80" x2="-50" y2="100" stroke="#00D4AA" stroke-width="0.8" opacity="0.2"/>
    <line x1="30" y1="-110" x2="-110" y2="40" stroke="#7C3AED" stroke-width="0.8" opacity="0.2"/>
    <line x1="30" y1="-110" x2="120" y2="30" stroke="#00D4AA" stroke-width="0.8" opacity="0.15"/>
    <line x1="-30" y1="-60" x2="80" y2="-90" stroke="#7C3AED" stroke-width="0.8" opacity="0.15"/>
    <line x1="-80" y1="80" x2="120" y2="30" stroke="#FF6B35" stroke-width="0.8" opacity="0.15"/>
    <line x1="-30" y1="-60" x2="-110" y2="40" stroke="#00D4AA" stroke-width="0.8" opacity="0.15"/>
    
    <!-- Center pulse -->
    <circle cx="0" cy="0" r="12" fill="url(#glow1)" opacity="0.6"/>
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="0.9"/>
  </g>
  
  <!-- Main text -->
  <text x="100" y="140" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="72" fill="url(#glow1)" filter="url(#softGlow)">AI4CHANGE</text>
  
  <!-- Tagline -->
  <text x="104" y="195" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="400" font-size="26" fill="#E2E8F0" letter-spacing="0.08em">AI as the Great Equalizer</text>
  
  <!-- Divider -->
  <rect x="100" y="215" width="400" height="2" rx="1" fill="url(#glow1)" opacity="0.3"/>
  
  <!-- Description -->
  <text x="104" y="252" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="300" font-size="18" fill="#94A3B8">Real people from around the world, each using AI</text>
  <text x="104" y="278" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="300" font-size="18" fill="#94A3B8">as their instrument to solve humanity's problems.</text>
  
  <!-- Badges -->
  <g transform="translate(104, 310)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="#00D4AA" opacity="0.15" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.3"/>
    <text x="60" y="20" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#00D4AA" text-anchor="middle">OPEN SOURCE</text>
    
    <rect x="135" y="0" width="150" height="30" rx="15" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.3"/>
    <text x="210" y="20" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#7C3AED" text-anchor="middle">COMMUNITY DRIVEN</text>
    
    <rect x="300" y="0" width="130" height="30" rx="15" fill="#FF6B35" opacity="0.15" stroke="#FF6B35" stroke-width="1" stroke-opacity="0.3"/>
    <text x="365" y="20" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#FF6B35" text-anchor="middle">AI POWERED</text>
  </g>
  
  <!-- URL -->
  <text x="104" y="375" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="500" font-size="15" fill="#64748B">ai4change-org.github.io</text>
</svg>
