<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="og-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1A1040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D2847;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="og-teal-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="og-line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.4" />
    </linearGradient>
    <filter id="og-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="og-glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-grad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#00D4AA" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="200" x2="800" y2="630"/>
    <line x1="0" y1="400" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="1200" y2="300"/>
  </g>
  
  <!-- Logo mark (left side) -->
  <g transform="translate(120, 180) scale(0.52)">
    <!-- Connection lines -->
    <g stroke="url(#og-line)" stroke-width="1.5" fill="none" opacity="0.5">
      <line x1="256" y1="130" x2="170" y2="200"/>
      <line x1="256" y1="130" x2="340" y2="195"/>
      <line x1="256" y1="130" x2="256" y2="256"/>
      <line x1="170" y1="200" x2="140" y2="300"/>
      <line x1="170" y1="200" x2="256" y2="256"/>
      <line x1="340" y1="195" x2="370" y2="290"/>
      <line x1="340" y1="195" x2="256" y2="256"/>
      <line x1="140" y1="300" x2="200" y2="370"/>
      <line x1="140" y1="300" x2="256" y2="256"/>
      <line x1="370" y1="290" x2="310" y2="375"/>
      <line x1="370" y1="290" x2="256" y2="256"/>
      <line x1="200" y1="370" x2="256" y2="256"/>
      <line x1="310" y1="375" x2="256" y2="256"/>
      <line x1="200" y1="370" x2="310" y2="375"/>
      <line x1="170" y1="200" x2="340" y2="195"/>
      <line x1="140" y1="300" x2="370" y2="290"/>
    </g>
    <!-- Nodes -->
    <circle cx="256" cy="130" r="10" fill="#00D4AA" filter="url(#og-glow)"/>
    <circle cx="256" cy="130" r="5" fill="#fff" opacity="0.9"/>
    <circle cx="170" cy="200" r="9" fill="#00D4AA" filter="url(#og-glow)"/>
    <circle cx="170" cy="200" r="4.5" fill="#fff" opacity="0.85"/>
    <circle cx="340" cy="195" r="9" fill="#7C3AED" filter="url(#og-glow)"/>
    <circle cx="340" cy="195" r="4.5" fill="#fff" opacity="0.85"/>
    <circle cx="140" cy="300" r="9" fill="#FF6B35" filter="url(#og-glow)"/>
    <circle cx="140" cy="300" r="4.5" fill="#fff" opacity="0.85"/>
    <circle cx="370" cy="290" r="8" fill="#7C3AED" filter="url(#og-glow)"/>
    <circle cx="370" cy="290" r="4" fill="#fff" opacity="0.85"/>
    <circle cx="200" cy="370" r="8" fill="#00D4AA" filter="url(#og-glow)"/>
    <circle cx="200" cy="370" r="4" fill="#fff" opacity="0.85"/>
    <circle cx="310" cy="375" r="8" fill="#FF6B35" filter="url(#og-glow)"/>
    <circle cx="310" cy="375" r="4" fill="#fff" opacity="0.85"/>
    <!-- Center hub -->
    <circle cx="256" cy="256" r="18" fill="url(#og-teal-violet)" filter="url(#og-glow-strong)" opacity="0.9"/>
    <circle cx="256" cy="256" r="10" fill="#0A0E1A"/>
    <circle cx="256" cy="256" r="7" fill="url(#og-teal-violet)" opacity="0.8"/>
    <circle cx="256" cy="256" r="3.5" fill="#fff" opacity="0.95"/>
    <circle cx="256" cy="256" r="28" fill="none" stroke="#00D4AA" stroke-width="0.8" opacity="0.2"/>
  </g>
  
  <!-- Accent line -->
  <rect x="480" y="290" width="600" height="2" rx="1" fill="url(#og-teal-violet)" opacity="0.6"/>
  
  <!-- Text content -->
  <!-- Title -->
  <text x="490" y="270" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="-1">AI4Change</text>
  
  <!-- Subtitle -->
  <text x="490" y="330" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="400" fill="#94A3B8" letter-spacing="0.5">AI as the Great Equalizer</text>
  
  <!-- Description -->
  <text x="490" y="380" font-family="'Inter', system-ui, sans-serif" font-size="16" fill="#64748B">Real people. Real problems. AI as the instrument. Open source solutions.</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0A0E1A" opacity="0.8"/>
  <text x="490" y="612" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#64748B" letter-spacing="2">OPEN SOURCE</text>
  <text x="640" y="612" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#64748B">·</text>
  <text x="660" y="612" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#64748B" letter-spacing="2">COMMUNITY DRIVEN</text>
  <text x="855" y="612" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#64748B">·</text>
  <text x="875" y="612" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#64748B" letter-spacing="2">GLOBAL IMPACT</text>
  
  <!-- Website URL -->
  <text x="490" y="545" font-family="'JetBrains Mono', monospace" font-size="14" fill="#00D4AA" opacity="0.7">ai4change-org.github.io</text>
  
  <!-- GitHub icon hint -->
  <text x="490" y="490" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#64748B">github.com/ai4change-org</text>
</svg>
