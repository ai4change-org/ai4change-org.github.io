<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="tv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="vc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0A0E1A"/>
  <!-- Globe glow -->
  <circle cx="16" cy="16" r="13" fill="url(#rg)"/>
  <!-- Globe ring -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="url(#tv)" stroke-width="1.2" opacity="0.3"/>
  <!-- Latitude hint -->
  <ellipse cx="16" cy="16" rx="11.5" ry="4.5" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.15"/>
  <!-- Longitude hint -->
  <ellipse cx="16" cy="16" rx="4.5" ry="11.5" fill="none" stroke="#00D4AA" stroke-width="0.5" opacity="0.15"/>
  <!-- Neural connections -->
  <line x1="9" y1="12" x2="14.5" y2="15" stroke="#00D4AA" stroke-width="1.2" opacity="0.7" stroke-linecap="round"/>
  <line x1="14.5" y1="15" x2="22" y2="11.5" stroke="url(#tv)" stroke-width="1.2" opacity="0.7" stroke-linecap="round"/>
  <line x1="14.5" y1="15" x2="19" y2="22" stroke="url(#vc)" stroke-width="1.1" opacity="0.6" stroke-linecap="round"/>
  <line x1="14.5" y1="15" x2="10" y2="21" stroke="#00D4AA" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <line x1="10" y1="21" x2="19" y2="22" stroke="#FF6B35" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
  <line x1="22" y1="11.5" x2="19" y2="22" stroke="#7C3AED" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
  <!-- Neural nodes -->
  <circle cx="9" cy="12" r="2.2" fill="#00D4AA"/>
  <circle cx="14.5" cy="15" r="2.8" fill="url(#tv)"/>
  <circle cx="22" cy="11.5" r="2" fill="#7C3AED"/>
  <circle cx="10" cy="21" r="1.8" fill="#00D4AA"/>
  <circle cx="19" cy="22" r="2" fill="#FF6B35"/>
  <!-- Central highlight -->
  <circle cx="14.5" cy="15" r="1.2" fill="white" opacity="0.35"/>
</svg>