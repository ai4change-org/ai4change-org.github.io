<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0A0E1A 0%, #1A1040 40%, #0D2847 100%);
    color: #E2E8F0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}
.glow-1 {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,212,170,0.15) 0%, transparent 70%);
    top: -100px;
    right: -50px;
    border-radius: 50%;
}
.glow-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    bottom: -80px;
    left: -50px;
    border-radius: 50%;
}
.glow-3 {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
}
.grid {
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
}
.nodes {
    position: absolute;
    inset: 0;
}
.node {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(0,212,170,0.4);
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(0,212,170,0.3);
}
.node:nth-child(1) { top: 15%; left: 10%; }
.node:nth-child(2) { top: 25%; left: 85%; width: 8px; height: 8px; background: rgba(124,58,237,0.5); box-shadow: 0 0 12px rgba(124,58,237,0.3); }
.node:nth-child(3) { top: 70%; left: 15%; }
.node:nth-child(4) { top: 80%; left: 80%; width: 5px; height: 5px; }
.node:nth-child(5) { top: 10%; left: 50%; width: 4px; height: 4px; background: rgba(255,107,53,0.4); }
.node:nth-child(6) { top: 85%; left: 45%; width: 5px; height: 5px; background: rgba(124,58,237,0.4); }
.node:nth-child(7) { top: 40%; left: 5%; width: 4px; height: 4px; }
.node:nth-child(8) { top: 55%; left: 92%; width: 7px; height: 7px; }
.content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 80px;
}
.badge {
    display: inline-block;
    padding: 8px 24px;
    border: 1px solid rgba(0,212,170,0.3);
    border-radius: 100px;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #00D4AA;
    margin-bottom: 32px;
    background: rgba(0,212,170,0.05);
}
h1 {
    font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 20px;
    letter-spacing: -2px;
}
h1 span {
    background: linear-gradient(135deg, #00D4AA, #7C3AED);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.tagline {
    font-size: 28px;
    color: #94A3B8;
    font-weight: 400;
    line-height: 1.4;
    max-width: 700px;
    margin: 0 auto 32px;
}
.url {
    font-size: 16px;
    color: rgba(0,212,170,0.6);
    letter-spacing: 1px;
}
.border-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #00D4AA, #7C3AED, #FF6B35);
}
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>
<div class="glow-3"></div>
<div class="grid"></div>
<div class="nodes">
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>
    <div class="node"></div>
</div>
<div class="content">
    <div class="badge">Open Source &middot; Community Driven</div>
    <h1>AI4<span>Change</span></h1>
    <p class="tagline">AI as the Great Equalizer</p>
    <p class="url">ai4change.org</p>
</div>
<div class="border-line"></div>
</body>
</html>
